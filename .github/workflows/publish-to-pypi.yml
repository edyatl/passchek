name: Publish to PyPI

on:
  push:
    tags:
      - "*"          # Triggers on every new tag (e.g. 0.2.3, v0.2.3, etc.)
      # Alternative: - "v*"   # Only tags starting with 'v'

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/passchek

    permissions:
      id-token: write   # Mandatory for Trusted Publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important for setuptools_scm or version detection

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password or token needed with Trusted Publishing
